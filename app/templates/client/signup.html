{% extends 'base.html' %}
{% block title %}Cadastro do restaurante{% endblock %}
{% block content %}
<section class="auth-layout">
  <div class="auth-copy panel panel-accent">
    <p class="eyebrow">Primeiro acesso</p>
    <h2>Crie o acesso do restaurante</h2>
    <p class="muted">Preencha os dados do responsável e do restaurante para liberar o início do cadastro dos produtos.</p>
  </div>

  <form method="post" class="panel auth-form stacked-form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div class="form-row">
      <div>
        <label for="owner_name">Nome</label>
        <input id="owner_name" type="text" name="owner_name" autocomplete="name" required>
      </div>
      <div>
        <label for="age">Idade</label>
        <input id="age" type="number" name="age" min="1" max="120" required>
      </div>
    </div>

    <div class="form-row">
      <div>
        <label for="email">E-mail</label>
        <input id="email" type="email" name="email" autocomplete="email" required>
      </div>
      <div>
        <label for="restaurant_name">Nome do restaurante</label>
        <input id="restaurant_name" type="text" name="restaurant_name" required>
      </div>
    </div>

    <div class="form-row">
      <div>
        <label for="cnpj">CNPJ</label>
        <input id="cnpj" type="text" name="cnpj" inputmode="numeric" required>
      </div>
      <div>
        <label for="cell_phone">Celular</label>
        <input id="cell_phone" type="tel" name="cell_phone" autocomplete="tel" required>
      </div>
    </div>

    <div>
      <label for="restaurant_address">Endereço do restaurante</label>
      <input id="restaurant_address" type="text" name="restaurant_address" autocomplete="street-address" required>
    </div>

    <div class="form-row">
      <div>
        <label for="username">Usuário</label>
        <input id="username" type="text" name="username" autocomplete="username" required>
      </div>
      <div>
        <label for="password">Senha</label>
        <input id="password" type="password" name="password" autocomplete="new-password" required>
      </div>
    </div>

    <div>
      <label for="password_confirm">Confirmação de senha</label>
      <input id="password_confirm" type="password" name="password_confirm" autocomplete="new-password" required>
    </div>

    <button type="submit" class="btn btn-primary btn-block">Avançar</button>
  </form>
</section>
{% endblock %}
