<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#ffffff">

  <title>QRTotem | Autoatendimento no celular</title>

  <style>
    :root {
      --page-bg: #ffffff;
      --focus-color: #ff7a00;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background: var(--page-bg);
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      overflow-x: hidden;
    }

    .landing-page {
      width: 100%;
      min-height: 100vh;
      background: #ffffff;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .landing-art {
      position: relative;
      width: 100%;
      max-width: 760px;
      margin: 0 auto;
      line-height: 0;
      background: #ffffff;
    }

    .landing-art img {
      display: block;
      width: 100%;
      height: auto;
      user-select: none;
      -webkit-user-drag: none;
    }

    /*
      Botões reais sobre a imagem.

      Eles ficam transparentes para manter a landing exatamente com o visual
      da imagem original, mas continuam clicáveis.

      Todos estão apontando para /cadastro, que é a rota já existente
      do seu projeto para criar conta.
    */
    .landing-hotspot {
      position: absolute;
      display: block;
      border: 0;
      border-radius: 14px;
      background: transparent;
      cursor: pointer;
      text-indent: -9999px;
      overflow: hidden;
      z-index: 5;
      line-height: normal;
      -webkit-tap-highlight-color: rgba(255, 122, 0, 0.18);
    }

    .landing-hotspot:focus-visible {
      outline: 3px solid var(--focus-color);
      outline-offset: 3px;
      background: rgba(255, 122, 0, 0.08);
    }

    /*
      Coordenadas baseadas na imagem 760x1600.

      left/top/width/height estão em porcentagem para manter a proporção
      perfeita em desktop e celular.
    */

    /* Botão "Criar conta" no passo 1 */
    .hotspot-create-account-step {
      left: 4.3%;
      top: 45.7%;
      width: 12.7%;
      height: 2.4%;
    }

    /* Botão "Salvar chave" no passo 3 */
    .hotspot-save-pix {
      left: 42.4%;
      top: 45.7%;
      width: 12.8%;
      height: 2.4%;
    }

    /* Botão "Salvar" no passo 4 */
    .hotspot-save-tables {
      left: 61.7%;
      top: 45.7%;
      width: 12.8%;
      height: 2.4%;
    }

    /* Botão "Baixar QR Codes" no passo 5 */
    .hotspot-download-qrcodes {
      left: 80.2%;
      top: 45.7%;
      width: 15.2%;
      height: 2.4%;
    }

    /* Botão grande "COMEÇAR AGORA" no rodapé */
    .hotspot-main-cta {
      left: 53.8%;
      top: 92.5%;
      width: 37.2%;
      height: 5.0%;
      border-radius: 18px;
    }

    /*
      Em telas maiores, mantém a imagem no tamanho original.
      Em telas menores, a imagem reduz proporcionalmente.
    */
    @media (min-width: 761px) {
      .landing-page {
        padding: 0;
      }

      .landing-art {
        box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.02);
      }
    }

    @media (max-width: 480px) {
      .landing-art {
        max-width: 100%;
      }

      .landing-hotspot:focus-visible {
        outline-width: 2px;
        outline-offset: 2px;
      }
    }
  </style>
</head>

<body>
  <main class="landing-page" aria-label="QRTotem - Totem de autoatendimento no celular">
    <section class="landing-art">
      <img
        src="{{ url_for('static', filename='img/landing-qrtotem.jpeg') }}"
        alt="QRTotem - Totem de autoatendimento no celular. Planos a partir de R$ 149,90 por mês. Crie sua conta, escaneie seu cardápio, cadastre sua chave Pix, informe suas mesas e receba seus QR Codes."
      >

      <a
        class="landing-hotspot hotspot-create-account-step"
        href="{{ url_for('client.signup') }}"
        aria-label="Criar conta"
      >
        Criar conta
      </a>

      <a
        class="landing-hotspot hotspot-save-pix"
        href="{{ url_for('client.signup') }}"
        aria-label="Cadastrar chave Pix"
      >
        Cadastrar chave Pix
      </a>

      <a
        class="landing-hotspot hotspot-save-tables"
        href="{{ url_for('client.signup') }}"
        aria-label="Cadastrar mesas"
      >
        Cadastrar mesas
      </a>

      <a
        class="landing-hotspot hotspot-download-qrcodes"
        href="{{ url_for('client.signup') }}"
        aria-label="Baixar QR Codes"
      >
        Baixar QR Codes
      </a>

      <a
        class="landing-hotspot hotspot-main-cta"
        href="{{ url_for('client.signup') }}"
        aria-label="Começar agora"
      >
        Começar agora
      </a>
    </section>
  </main>
</body>
</html>
