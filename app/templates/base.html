<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#FFFFFF">
  <meta name="csrf-token" content="{{ csrf_token() }}">
  <title>{% block title %}QRTotem{% endblock %}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="icon" type="image/png" sizes="192x192" href="{{ url_for('static', filename='img/favicon-192.png') }}">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='img/apple-touch-icon.png') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
  <script defer src="{{ url_for('static', filename='js/app.js') }}"></script>
</head>

<body>
  <a class="skip-link" href="#conteudo-principal">Pular para o conteúdo</a>

  <div class="app-layout">
    <aside class="app-sidebar" aria-label="Menu lateral">
      <a class="sidebar-brand" href="{{ url_for('client.home') }}" aria-label="Ir para a página inicial">
        <img src="{{ url_for('static', filename='img/logo-horizontal-dark.png') }}" alt="QRTotem">
      </a>

      <nav class="sidebar-nav" aria-label="Menu principal">
        <a href="{{ url_for('client.home') }}">
          <span class="nav-icon" aria-hidden="true">⌂</span>
          <span>Cliente</span>
        </a>

        <a href="{{ url_for('admin.login') }}">
          <span class="nav-icon" aria-hidden="true">▦</span>
          <span>Admin</span>
        </a>

        <a href="{{ url_for('kitchen.orders') }}" data-kitchen-access>
          <span class="nav-icon" aria-hidden="true">◷</span>
          <span>Cozinha</span>
        </a>

        <a href="{{ url_for('client.profile') }}">
          <span class="nav-icon" aria-hidden="true">◌</span>
          <span>Cadastro</span>
        </a>

        <a href="{{ url_for('client.tables_setup') }}">
          <span class="nav-icon" aria-hidden="true">□</span>
          <span>Mesas</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <span class="sidebar-caption">Sistema de pedidos</span>
        <strong>QR Code para restaurantes</strong>
      </div>
    </aside>

    <div class="app-main">
      <header class="app-header">
        <a class="brand-area" href="{{ url_for('client.home') }}" aria-label="Ir para a página inicial">
          <span class="brand-logo">
            <img src="{{ url_for('static', filename='img/logo-icon-light.png') }}" alt="">
          </span>

          <span class="brand-text">
            <strong class="brand-title">QRTotem</strong>
            <span class="brand-subtitle">Sistema de pedidos</span>
          </span>
        </a>

        <nav class="app-nav" aria-label="Menu principal">
          <a href="{{ url_for('client.home') }}">Cliente</a>
          <a href="{{ url_for('admin.login') }}">Admin</a>
          <a href="{{ url_for('kitchen.orders') }}" data-kitchen-access>Cozinha</a>

          <details class="profile-menu">
            <summary>Perfil</summary>
            <div class="profile-menu-panel">
              <a href="{{ url_for('client.profile') }}">Editar cadastro</a>
              <a href="{{ url_for('client.tables_setup') }}">Editar mesas</a>
            </div>
          </details>
        </nav>
      </header>

      {% include 'partials/messages.html' %}

      <main id="conteudo-principal" class="content-grid">
        {% block content %}{% endblock %}
      </main>
    </div>
  </div>
</body>
</html>
