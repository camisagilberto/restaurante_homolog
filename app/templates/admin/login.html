{% extends 'base.html' %}
{% block title %}Login do Admin{% endblock %}
{% block content %}
<section class="auth-layout">
  <div class="auth-copy panel panel-accent">
    <p class="eyebrow">Painel administrativo</p>
    <h2>Gestão profissional do cardápio</h2>
    <p class="muted">Entre para cadastrar produtos, ativar itens e manter o cardápio organizado.</p>
  </div>

  <form method="post" class="panel auth-form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label for="username">Usuário</label>
    <input id="username" type="text" name="username" autocomplete="username" required>

    <label for="password">Senha</label>
    <input id="password" type="password" name="password" autocomplete="current-password" required>

    <button type="submit" class="btn btn-primary btn-block">Entrar</button>
    <p class="muted note">Login padrão: <strong>admin</strong> / <strong>123456</strong></p>
  </form>
</section>
{% endblock %}
